data_root_dir: "data"

data_ingestion:
  root_dir: "data/raw"
  
  # --- DIV2K (Main Dataset) ---
  dataset:
    name: DIV2K
    root_dir: data/raw/DIV2K
    train:
      hr_dir: data/raw/DIV2K/DIV2K_train_HR
      lr_dir: data/raw/DIV2K/DIV2K_train_LR_bicubic/X4
    val:
      hr_dir: data/raw/DIV2K/DIV2K_valid_HR
      lr_dir: data/raw/DIV2K/DIV2K_valid_LR_bicubic/X4

  # --- Set5 (Test Dataset) ---
  test_dataset:
    name: Set5
    root_dir: data/raw/Set5
    hr_dir: data/raw/Set5/HR
    lr_dir: data/raw/Set5/LR_bicubic/X4

  download:
    enabled: true
    urls:
      train_hr: "https://data.vision.ee.ethz.ch/cvl/DIV2K/DIV2K_train_HR.zip"
      train_lr_x4: "https://data.vision.ee.ethz.ch/cvl/DIV2K/DIV2K_train_LR_bicubic_X4.zip"
      val_hr: "https://data.vision.ee.ethz.ch/cvl/DIV2K/DIV2K_valid_HR.zip"
      val_lr_x4: "https://data.vision.ee.ethz.ch/cvl/DIV2K/DIV2K_valid_LR_bicubic_X4.zip"
      set5: "https://data.deepai.org/set5.zip"
      

  processing:
    scale: 4
    patch_size: 96
    batch_size: 16
    num_workers: 4


data_transformation:
  root_dir: data/processed
  data_path: data/raw/DIV2K
  srcnn_dir: data/processed/srcnn
  srgan_dir: data/processed/srgan
  
  params:
    patch_size: 96        # Size of the HR patch
    stride: 96            # Overlap for patching (smaller = more data)
    scale: 4              # Upscaling factor
    interpolation: "bicubic"


model_training:
  root_dir: artifacts/model_training
  trained_model_choice: "srcnn" 
  device: "cuda" # Now being used by the ConfigManager
  log_step: 100         # Get logs every 100 batches (more frequent visibility)
  patience: 10
  
  srcnn:
    train_data: data/processed/srcnn/srcnn_train.h5
    valid_data: data/processed/srcnn/srcnn_valid.h5
    # PATH FIXED: Stored in artifacts, not the code directory
    model_path: artifacts/model_training/srcnn.pth
    params:
      epochs: 100
      batch_size: 16
      lr: 0.0001
      normalization: "zero_to_one"
      
  srgan:
    train_data: data/processed/srgan/srgan_train.h5
    valid_data: data/processed/srgan/srgan_valid.h5
    # PATH FIXED: Stored in artifacts, not the code directory
    model_path: artifacts/model_training/srgan_gen.pth
    params:
      epochs: 200
      batch_size: 16
      lr: 0.0001
      normalization: "minus_one_to_one"